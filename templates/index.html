{% extends "base.html" %}

{% block content %}
<h1>Users</h1>

<ul>
    {% for user in users %}
        <li>
            <a href="{{ url_for('list_movies', user_id=user.id) }}">
                {{ user.name }}
            </a>
        </li>
    {% endfor %}
</ul>

<form action="{{ url_for('create_user') }}" method="post">
    <label for="name">Name</label>
    <input id="name" name="name" type="text">
    <button type="submit">Add User</button>
</form>
{% endblock %}

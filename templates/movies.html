{% extends "base.html" %}

{% block content %}
<h1>Movies</h1>

<ul>
    {% for movie in movies %}
        <li>
            <p>{{ movie.name }}</p>
            <p>{{ movie.director }}</p>
            <p>{{ movie.year }}</p>
            <img src="{{ movie.poster_url }}" alt="{{ movie.name }} poster">

            <form
                action="{{ url_for(
                    'update_movie',
                    user_id=user_id,
                    movie_id=movie.id
                ) }}"
                method="post"
            >
                <label for="new-title-{{ movie.id }}">New title</label>
                <input
                    id="new-title-{{ movie.id }}"
                    name="new_title"
                    type="text"
                    required
                >
                <button type="submit">Update Movie</button>
            </form>

            <form
                action="{{ url_for(
                    'delete_movie',
                    user_id=user_id,
                    movie_id=movie.id
                ) }}"
                method="post"
            >
                <button type="submit">Delete Movie</button>
            </form>
        </li>
    {% endfor %}
</ul>

<form action="{{ url_for('add_movie', user_id=user_id) }}" method="post">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required>

    <label for="director">Director</label>
    <input id="director" name="director" type="text" required>

    <label for="year">Year</label>
    <input id="year" name="year" type="number" required>

    <label for="poster-url">Poster URL</label>
    <input id="poster-url" name="poster_url" type="url" required>

    <button type="submit">Add Movie</button>
</form>
{% endblock %}

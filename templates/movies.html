{% extends "base.html" %}

{% block content %}
<h1>Movies</h1>
<p>
    <a class="back-link" href="{{ url_for('index') }}">Back to Users</a>
</p>

<ul class="movie-list">
    {% for movie in movies %}
        <li class="movie-card">
            <div class="movie-details">
                <h2>{{ movie.name }}</h2>
                <p><strong>Director:</strong> {{ movie.director }}</p>
                <p><strong>Year:</strong> {{ movie.year }}</p>

                {% if movie.poster_url != "N/A" %}
                    <img src="{{ movie.poster_url }}" alt="{{ movie.name }} poster">
                {% endif %}
            </div>

            <div class="movie-actions">
                <form
                    class="inline-form"
                    action="{{ url_for(
                        'update_movie',
                        user_id=user_id,
                        movie_id=movie.id
                    ) }}"
                    method="post"
                >
                    <label for="new-title-{{ movie.id }}">New title</label>
                    <input
                        id="new-title-{{ movie.id }}"
                        name="new_title"
                        type="text"
                        required
                    >
                    <button type="submit">Update Movie</button>
                </form>

                <form
                    class="inline-form"
                    action="{{ url_for(
                        'delete_movie',
                        user_id=user_id,
                        movie_id=movie.id
                    ) }}"
                    method="post"
                >
                    <button class="danger-button" type="submit">
                        Delete Movie
                    </button>
                </form>
            </div>
        </li>
    {% endfor %}
</ul>

<form class="form-panel" action="{{ url_for('add_movie', user_id=user_id) }}" method="post">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required>

    <button type="submit">Add Movie</button>
</form>
{% endblock %}
